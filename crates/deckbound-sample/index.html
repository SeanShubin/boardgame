<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Deckbound (sample)</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        overflow: hidden;
      }
      /* Bevy renders into this canvas; fill the viewport so the window-fit
         logic (fit_canvas_to_parent) has the full page to size against. */
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
      }
    </style>
    <!--
      Trunk entry point for the Deckbound sample scenario. Kept for compatibility
      so the reference game can still be built to the web locally; the deployed
      product is the card-table `boardgame` bin (see ../boardgame/index.html).
    -->
    <link data-trunk rel="rust" data-bin="deckbound-sample" data-wasm-opt="z" />
  </head>
  <body></body>
</html>
